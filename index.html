<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestãoFllex</title>
    <meta name="description" content="Sistema GestãoFllex" />
    <meta name="author" content="MegaFllex Soluções" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/src/assets/logo-transparent-04707.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/src/assets/logo-transparent-04707.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/src/assets/logo-transparent-04707.png"
    />
    <link rel="manifest" id="manifest-link" />
    <link rel="apple-touch-icon" sizes="192x192" href="/src/assets/logo-transparent-04707.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/src/assets/logo-transparent-04707.png" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:title" content="GestãoFllex - MegaFllex" />
    <meta property="og:description" content="GestãoFllex - MegaFllex" />
  </head>

  <body>
    <div id="root"></div>
    <!-- @skip-protected: Do not remove. Required for app features. -->
    <script src="https://goskip.dev/skip.js"></script>

    <script type="module">
      import logoUrl from "/src/assets/logo-transparent-04707.png";
      const manifest = {
        name: "GestãoFllex",
        short_name: "GestãoFllex",
        start_url: "/",
        display: "standalone",
        background_color: "#ffffff",
        theme_color: "#0f172a",
        icons: [
          {
            src: logoUrl,
            sizes: "192x192",
            type: "image/png",
            purpose: "any maskable",
          },
          {
            src: logoUrl,
            sizes: "512x512",
            type: "image/png",
            purpose: "any maskable",
          },
        ],
      };
      document.getElementById("manifest-link").href =
        "data:application/manifest+json;charset=utf-8," +
        encodeURIComponent(JSON.stringify(manifest));
    </script>

    <!-- @skip-protected: Do not remove. App entrypoint. -->
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(console.error);
        });
      }
    </script>
  </body>
</html>
